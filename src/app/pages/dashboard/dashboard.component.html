<div class="dashboard-container">

    <mat-card class="header-card">

        <div class="header-content">

            <div>
                <h1>Fondos disponibles</h1>
                <p>Administra tus inversiones de forma segura</p>
            </div>

            <div class="balance-box">
                <h2>{{ balance | currency:'COP':'symbol':'1.0-0' }}</h2>
                <span>Saldo disponible</span>
            </div>

        </div>

    </mat-card>

    <mat-card class="filter-card">

        <mat-form-field appearance="outline" class="notification-field">
            <mat-label>Método de notificación</mat-label>

            <mat-select [(ngModel)]="notificationMethod">
                <mat-option value="Email">Email</mat-option>
                <mat-option value="SMS">SMS</mat-option>
            </mat-select>

        </mat-form-field>

    </mat-card>

    <div class="funds-grid">

        <mat-card *ngFor="let fund of funds" class="fund-card">

            <mat-card-title>{{ fund.name }}</mat-card-title>

            <mat-card-content>

                <p>
                    Monto mínimo:
                    {{ fund.minimumAmount | currency:'COP':'symbol':'1.0-0' }}
                </p>

                <p>Categoría: {{ fund.category }}</p>

            </mat-card-content>

            <mat-card-actions>

                <button mat-raised-button color="primary" (click)="subscribeFund(fund)">
                    Suscribirse
                </button>

                <button mat-raised-button color="warn" (click)="cancelFund(fund)">
                    Cancelar
                </button>

            </mat-card-actions>

        </mat-card>

    </div>

</div>
